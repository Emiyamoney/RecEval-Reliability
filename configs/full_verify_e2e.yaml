# 完整验证配置：端到端 dual_soft_gating 在 3 个数据集上的 3-seed 实验
# 目标：验证新代码在多 seed 多 split 上的稳定性和性能优势
mode: full_verify
device: cpu

runtime:
  device: cpu
  num_workers: 0
  pin_memory: false
  amp: false
  torch_compile: false
  cudnn_benchmark: false
  show_progress: true
  progress_leave: false
  profile_timing: true

datasets:
  - ml1m
  - book_crossing
  - goodbooks

sample:
  enabled: false

splits:
  - strict_cold
  - warm_random
  - warm_temporal

training:
  epochs: 20
  batch_size: 2048
  embedding_dim: 64
  hidden_dims: [128, 64]
  early_stopping_patience: 5
  num_workers: 0
  lr: 0.005

seeds: [2024, 2025, 2026]

tau_scan:
  values: auto

# 只跑 dual_soft_gating（其他模型已有结果可对比）
models:
  - dual_soft_gating

output_dir: "results/full_verify_e2e"
